<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vade Mecum Digital | Acesso</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> 

    <style>
        /* ==================== VARIÁVEIS MODERNIZADAS ==================== */
        :root {
            --primary-color: #0f172a; 
            --primary-light: #1e293b;
            --accent-color: #2563eb; 
            --accent-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --surface-color: #ffffff; 
            --text-main: #334155; 
            --text-light: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-float: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        /* ==================== RESET & BASE ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; -webkit-font-smoothing: antialiased; }

        /* ==================== TELA DE LOGIN PREMIUM ==================== */
        #telaAuth { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: radial-gradient(circle at top left, #1e293b, var(--primary-color)); }
        .auth-card { 
            background: var(--surface-color); padding: 3.5rem 3rem; border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-float); width: 100%; max-width: 420px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .auth-card h2 { color: var(--primary-color); margin-bottom: 0.5rem; font-size: 2rem; font-weight: 700; letter-spacing: -0.025em; }
        .auth-card p { color: var(--text-light); margin-bottom: 2.5rem; font-size: 0.95rem; }
        .auth-form { display: flex; flex-direction: column; gap: 16px; }
        .auth-form input { 
            padding: 16px; border: 1px solid var(--border-color); border-radius: var(--radius-md); 
            font-size: 1rem; outline: none; transition: all 0.2s ease; background: #f8fafc;
        }
        .auth-form input:focus { border-color: var(--accent-color); background: #ffffff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .auth-btn { 
            background-color: var(--accent-color); color: white; padding: 16px; border: none; 
            border-radius: var(--radius-md); font-size: 1rem; font-weight: 600; cursor: pointer; 
            transition: all 0.2s ease; margin-top: 8px; box-shadow: var(--shadow-md);
        }
        .auth-btn:hover { background-color: var(--accent-hover); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .auth-toggle { margin-top: 24px; color: var(--text-light); font-size: 0.95rem; }
        .auth-toggle span { color: var(--accent-color); cursor: pointer; font-weight: 600; transition: color 0.2s ease; }
        .auth-toggle span:hover { color: var(--accent-hover); text-decoration: underline; }

        /* ==================== DASHBOARD PRINCIPAL ==================== */
        #telaApp { display: none; height: 100vh; width: 100vw; overflow: hidden; background-color: var(--bg-color); }

        /* BARRA LATERAL (SIDEBAR) */
        .sidebar { 
            width: 280px; background: linear-gradient(180deg, var(--primary-color) 0%, var(--primary-light) 100%); 
            color: white; display: flex; flex-direction: column; padding: 2.5rem 1.5rem; 
            box-shadow: 4px 0 24px rgba(0,0,0,0.1); z-index: 50; border-right: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar-logo { font-size: 1.5rem; font-weight: 700; margin-bottom: 3rem; display: flex; align-items: center; gap: 12px; letter-spacing: -0.025em; }
        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .sidebar-menu li { 
            padding: 14px 16px; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; 
            font-weight: 500; display: flex; align-items: center; color: #94a3b8; border: 1px solid transparent;
        }
        .sidebar-menu li:hover { background-color: rgba(255, 255, 255, 0.05); color: white; }
        .sidebar-menu li.active { 
            background-color: rgba(37, 99, 235, 0.15); color: #60a5fa; 
            border: 1px solid rgba(37, 99, 235, 0.3); font-weight: 600;
        }
        .sidebar-footer { margin-top: auto; }
        .btn-sair-sidebar { 
            width: 100%; background: rgba(255,255,255,0.05); color: #cbd5e1; border: 1px solid rgba(255,255,255,0.1); 
            padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; 
        }
        .btn-sair-sidebar:hover { background-color: #ef4444; color: white; border-color: #ef4444; transform: translateY(-2px); }

        /* ÁREA DIREITA (CONTEÚDO) */
        .main-content { flex: 1; overflow-y: auto; position: relative; scroll-behavior: smooth; }
        
        /* CABEÇALHO DO APP */
        header { 
            background-color: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 2rem 3rem; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 40;
        }
        header h1 { font-size: 1.8rem; color: var(--primary-color); margin-bottom: 0.2rem; font-weight: 700; letter-spacing: -0.025em; }
        header p { color: var(--text-light); font-weight: 400; font-size: 0.95rem; }

        .container { max-width: 1200px; margin: 0 auto; padding: 2.5rem 3rem; }
        
        /* CAIXA DE BUSCA */
        .search-box { 
            display: flex; gap: 12px; background: var(--surface-color); padding: 12px; 
            border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); border: 1px solid var(--border-color);
        }
        select, input[type="text"] { 
            padding: 16px; border: 1px solid transparent; border-radius: var(--radius-md); 
            font-size: 1rem; outline: none; transition: all 0.2s ease; background: #f8fafc;
        }
        select { cursor: pointer; color: var(--text-main); font-weight: 500; min-width: 200px; }
        input[type="text"] { flex: 1; }
        select:focus, input[type="text"]:focus { background: #ffffff; border-color: var(--accent-color); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .btn-pesquisar { 
            background-color: var(--accent-color); color: white; border: none; padding: 0 32px; 
            border-radius: var(--radius-md); font-size: 1rem; font-weight: 600; cursor: pointer; 
            transition: all 0.2s ease; box-shadow: var(--shadow-sm);
        }
        .btn-pesquisar:hover { background-color: var(--accent-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }

        /* SKELETON LOADING */
        #loading { display: none; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 3rem; }
        .skeleton-card { background: var(--surface-color); padding: 2.5rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 16px; }
        .skeleton-title { height: 28px; background: #e2e8f0; border-radius: 6px; width: 40%; animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .skeleton-line { height: 16px; background: #f1f5f9; border-radius: 4px; width: 100%; animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .skeleton-line.short { width: 75%; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* ÁREA DE RESULTADOS E CADERNO */
        .results-area { display: none; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 3rem; }
        .card { 
            background: var(--surface-color); padding: 2.5rem; border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-md); border: 1px solid var(--border-color);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
        .card h2 { font-size: 1.25rem; color: var(--primary-color); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 12px; font-weight: 700; }
        .tag { padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .tag-oficial { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .tag-ia { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
        
        .action-area { grid-column: 1 / -1; text-align: right; margin-top: 1rem; }
        .btn-salvar { 
            background-color: #10b981; color: white; border: none; padding: 14px 28px; 
            border-radius: var(--radius-md); font-weight: 600; cursor: pointer; transition: all 0.2s ease;
            box-shadow: var(--shadow-sm); display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-salvar:hover { background-color: #059669; transform: translateY(-2px); box-shadow: var(--shadow-md); }

        /* ITEM DO CADERNO */
        #sessaoCaderno { display: none; margin-top: 1rem; }
        .item-caderno { 
            background: var(--surface-color); padding: 2rem; border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-sm); margin-bottom: 1.5rem; border: 1px solid var(--border-color);
            border-left: 6px solid #10b981; transition: all 0.2s ease;
        }
        .item-caderno:hover { box-shadow: var(--shadow-md); transform: translateX(4px); }
        .item-caderno h3 { color: var(--primary-color); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; }
        .btn-excluir { 
            background-color: #fee2e2; color: #ef4444; border: 1px solid #fecaca; padding: 6px 16px; 
            border-radius: var(--radius-md); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
        }
        .btn-excluir:hover { background-color: #ef4444; color: white; }

        /* CONTEÚDO DA LEI E IA (Markdown) */
        #leiSeca { color: #475569; font-size: 1.05rem; line-height: 1.8; }
        
        /* A MÁGICA DA TIPOGRAFIA DA IA ACONTECE AQUI */
        #explicacaoIA { color: #334155; font-size: 1.05rem; line-height: 1.8; }
        
        /* Títulos mais imponentes e com divisórias sutis */
        #explicacaoIA h3 { 
            color: var(--primary-color); 
            margin-top: 2.5rem; 
            margin-bottom: 1.25rem; 
            font-size: 1.25rem; 
            font-weight: 700; 
            border-bottom: 2px solid var(--border-color); 
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
        }
        #explicacaoIA h3:first-child { margin-top: 0; }
        
        /* Respiro entre os parágrafos */
        #explicacaoIA p { margin-bottom: 1.25rem; }
        
        /* Listas organizadas e indentadas */
        #explicacaoIA ul, #explicacaoIA ol { 
            margin-bottom: 1.5rem; 
            padding-left: 1.5rem; 
        }
        #explicacaoIA li { 
            margin-bottom: 0.75rem; 
            padding-left: 0.5rem;
        }
        #explicacaoIA li::marker { color: var(--accent-color); font-weight: bold; }
        
        /* Destaques (negrito) com cara de marca-texto premium */
        #explicacaoIA strong { 
            color: var(--primary-color); 
            font-weight: 600; 
            background: rgba(37, 99, 235, 0.06); 
            padding: 2px 6px; 
            border-radius: 4px; 
        }

        /* RESPONSIVIDADE */
        @media (max-width: 992px) { 
            .results-area, #loading { grid-template-columns: 1fr; } 
        }
        @media (max-width: 768px) { 
            .search-box { flex-direction: column; padding: 16px; background: transparent; box-shadow: none; border: none; } 
            .btn-pesquisar { padding: 16px; } 
            .sidebar { width: 100%; height: auto; padding: 1.5rem; flex-direction: row; flex-wrap: wrap; justify-content: space-between; align-items: center; } 
            .sidebar-logo { margin-bottom: 0; }
            .sidebar-menu { flex-direction: row; width: 100%; margin-top: 1rem; }
            .sidebar-footer { width: 100%; margin-top: 1rem; }
            #telaApp { flex-direction: column; overflow-y: auto; } 
            .main-content { overflow-y: visible; }
            header { padding: 1.5rem; position: relative; }
            .container { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="telaAuth">
        <div class="auth-card">
            <h2 id="authTitulo">Bem-vindo(a)</h2>
            <p id="authSubtitulo">Faça login para acessar o seu Vade Mecum Digital.</p>

            <div class="auth-form">
                <input type="email" id="emailInput" placeholder="Seu e-mail">
                <input type="password" id="senhaInput" placeholder="Sua senha">
                <button class="auth-btn" id="authBotao" onclick="processarAuth()">Entrar</button>
            </div>

            <div class="auth-toggle">
                <p id="authTrocaTexto">Não tem uma conta? <span onclick="alternarModoAuth()">Criar minha conta</span></p>
            </div>
        </div>
    </div>


    <div id="telaApp">
        
        <aside class="sidebar">
            <div class="sidebar-logo">
                ⚖️ Vade Mecum
            </div>
            
            <ul class="sidebar-menu">
                <li id="menuBusca" class="active" onclick="navegarMenu('busca')">
                    🔍 Consultar Leis
                </li>
                <li id="menuCaderno" onclick="navegarMenu('caderno')">
                    📚 Meu Caderno 
                    <span id="contadorCaderno" style="background: var(--accent-color); color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; margin-left: auto;">0</span>
                </li>
            </ul>

            <div class="sidebar-footer">
                <button class="btn-sair-sidebar" onclick="fazerLogout()">🚪 Sair da Conta</button>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <div>
                    <h1 id="tituloPagina">Mesa de Estudos</h1>
                    <p id="subtituloPagina">A lei traduzida, explicada e direto ao ponto para a sua aprovação.</p>
                </div>
            </header>

            <div class="container">
                <div id="sessaoBusca">
                    <div class="search-box">
                        <select id="lawSelect">
                            <option value="cdc">CDC</option>
                            <option value="cc">Código Civil</option>
                            <option value="cp">Código Penal</option>
                            <option value="cf">Constituição Federal</option>
                        </select>
                        <input type="text" id="searchInput" placeholder="Ex: Artigo 121..." value="Artigo 121">
                        <button class="btn-pesquisar" onclick="realizarPesquisa()">Pesquisar</button>
                    </div>

                    <div id="loading">
                        <div class="skeleton-card">
                            <div class="skeleton-title"></div>
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line short"></div>
                        </div>
                        <div class="skeleton-card">
                            <div class="skeleton-title"></div>
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line short"></div>
                        </div>
                    </div>

                    <div id="resultsArea" class="results-area">
                        <div class="card">
                            <h2><span class="tag tag-oficial">Oficial</span> Texto da Lei</h2>
                            <div id="leiSeca"></div>
                        </div>

                        <div class="card" style="border-top-color: #10b981;">
                            <h2><span class="tag tag-ia">Professor IA</span> Explicação Didática</h2>
                            <div id="explicacaoIA"></div>
                        </div>
                        
                        <div class="action-area">
                            <button class="btn-salvar" onclick="salvarNoCaderno()">💾 Salvar no Caderno</button>
                        </div>
                    </div>
                </div>

                <div id="sessaoCaderno">
                    <div id="listaCaderno"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA42NDFJyf6dVGjKNVQGIypxQw-PMhc1ec",
            authDomain: "vade-mecum-digital-bc76b.firebaseapp.com",
            projectId: "vade-mecum-digital-bc76b",
            storageBucket: "vade-mecum-digital-bc76b.firebasestorage.app",
            messagingSenderId: "898854887053",
            appId: "1:898854887053:web:c424cf7dba13ade3bf8cc4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let modoLogin = true;
        let usuarioLogado = null;
        let pesquisaAtual = { lei: '', termo: '', leiSeca: '', explicacaoIA: '' };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                usuarioLogado = user;
                document.getElementById('telaAuth').style.display = 'none';
                document.getElementById('telaApp').style.display = 'flex';
                window.renderizarCaderno();
            } else {
                usuarioLogado = null;
                document.getElementById('telaApp').style.display = 'none';
                document.getElementById('telaAuth').style.display = 'flex';
            }
        });

        window.alternarModoAuth = function() {
            modoLogin = !modoLogin;
            const titulo = document.getElementById('authTitulo');
            const subtitulo = document.getElementById('authSubtitulo');
            const botao = document.getElementById('authBotao');
            const trocaTexto = document.getElementById('authTrocaTexto');

            if (modoLogin) {
                titulo.innerText = "Bem-vindo(a)";
                subtitulo.innerText = "Faça login para acessar o seu Vade Mecum Digital.";
                botao.innerText = "Entrar";
                trocaTexto.innerHTML = 'Não tem uma conta? <span onclick="alternarModoAuth()">Criar minha conta</span>';
            } else {
                titulo.innerText = "Criar Conta";
                subtitulo.innerText = "Comece a otimizar seus estudos agora mesmo.";
                botao.innerText = "Cadastrar";
                trocaTexto.innerHTML = 'Já tem uma conta? <span onclick="alternarModoAuth()">Faça Login</span>';
            }
        };

        window.processarAuth = async function() {
            const email = document.getElementById('emailInput').value;
            const senha = document.getElementById('senhaInput').value;

            if(!email || !senha) { alert("Por favor, preencha e-mail e senha."); return; }

            try {
                if (modoLogin) {
                    await signInWithEmailAndPassword(auth, email, senha);
                } else {
                    await createUserWithEmailAndPassword(auth, email, senha);
                    alert("Conta criada com sucesso! Seja bem-vindo.");
                }
            } catch (error) {
                console.error(error);
                alert("Erro na autenticação: " + error.message);
            }
        };

        window.fazerLogout = function() { signOut(auth); };

        window.realizarPesquisa = async function() {
            const searchInput = document.getElementById('searchInput').value;
            const lawSelect = document.getElementById('lawSelect');
            const nomeLei = lawSelect.options[lawSelect.selectedIndex].text;
            const siglaLei = lawSelect.value;
            
            const resultsArea = document.getElementById('resultsArea');
            const loading = document.getElementById('loading');
            
            resultsArea.style.display = 'none';
            loading.style.display = 'grid'; // Agora usa o grid do skeleton

            try {
                const resposta = await fetch('https://vademecum-api.onrender.com/api/buscar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ termo: searchInput, lei: siglaLei })
                });

                const dados = await resposta.json();

                if (dados.sucesso) {
                    document.getElementById('leiSeca').innerHTML = '<p>' + dados.lei_seca.replace(/\n/g, '<br>') + '</p>';
                    document.getElementById('explicacaoIA').innerHTML = marked.parse(dados.explicacao_ia);

                    pesquisaAtual = { lei: nomeLei, termo: searchInput, leiSeca: dados.lei_seca, explicacaoIA: dados.explicacao_ia };

                    loading.style.display = 'none';
                    resultsArea.style.display = 'grid';
                } else {
                    alert("Erro: " + dados.erro);
                    loading.style.display = 'none';
                }
            } catch (erro) {
                console.error("Erro:", erro);
                alert("Ocorreu um erro ao buscar o artigo. O servidor Python está rodando?");
                loading.style.display = 'none';
            }
        };

        window.salvarNoCaderno = async function() {
            if (!usuarioLogado) return;
            try {
                await addDoc(collection(db, "cadernos"), {
                    uid: usuarioLogado.uid,
                    lei: pesquisaAtual.lei,
                    termo: pesquisaAtual.termo,
                    leiSeca: pesquisaAtual.leiSeca,
                    explicacaoIA: pesquisaAtual.explicacaoIA,
                    dataSalvamento: new Date()
                });
                alert('Artigo salvo na nuvem com sucesso!');
                window.renderizarCaderno();
            } catch (e) {
                console.error("Erro ao salvar documento: ", e);
                alert("Erro ao salvar no caderno.");
            }
        };

        // FUNÇÃO DE NAVEGAÇÃO CORRIGIDA
        window.navegarMenu = function(tela) {
            const sessaoBusca = document.getElementById('sessaoBusca');
            const sessaoCaderno = document.getElementById('sessaoCaderno');
            const menuBusca = document.getElementById('menuBusca');
            const menuCaderno = document.getElementById('menuCaderno');
            const tituloPagina = document.getElementById('tituloPagina');
            const subtituloPagina = document.getElementById('subtituloPagina');
            
            if (tela === 'busca') {
                sessaoCaderno.style.display = 'none';
                sessaoBusca.style.display = 'block';
                
                menuCaderno.classList.remove('active');
                menuBusca.classList.add('active');
                
                tituloPagina.innerText = "Mesa de Estudos";
                subtituloPagina.innerText = "A lei traduzida, explicada e direto ao ponto para a sua aprovação.";
            } else if (tela === 'caderno') {
                sessaoBusca.style.display = 'none';
                sessaoCaderno.style.display = 'block';
                
                menuBusca.classList.remove('active');
                menuCaderno.classList.add('active');
                
                tituloPagina.innerText = "Meu Caderno Digital";
                subtituloPagina.innerText = "Suas anotações e explicações salvas na nuvem.";
                window.renderizarCaderno();
            }
        };

        window.renderizarCaderno = async function() {
            if (!usuarioLogado) return;
            
            const listaCaderno = document.getElementById('listaCaderno');
            listaCaderno.innerHTML = '<p>Buscando seu caderno na nuvem...</p>';
            
            try {
                const q = query(collection(db, "cadernos"), where("uid", "==", usuarioLogado.uid));
                const querySnapshot = await getDocs(q);
                
                document.getElementById('contadorCaderno').innerText = querySnapshot.size;
                listaCaderno.innerHTML = ''; 

                if (querySnapshot.empty) {
                    listaCaderno.innerHTML = '<p>Seu caderno está vazio. Busque um artigo e clique em "Salvar no Caderno"!</p>';
                    return;
                }

                querySnapshot.forEach((documento) => {
                    const item = documento.data();
                    const docId = documento.id;
                    
                    const htmlItem = `
                        <div class="item-caderno" id="doc-${docId}">
                            <h3><span>${item.lei} - ${item.termo}</span><button class="btn-excluir" onclick="removerDoCaderno('${docId}')">Excluir</button></h3>
                            <details style="margin-top: 10px; cursor: pointer;">
                                <summary style="font-weight: bold; color: var(--accent-color);">Ver Lei Seca</summary>
                                <p style="margin-top: 10px; padding: 10px; background: #f1f5f9; border-radius: 8px;">${item.leiSeca.replace(/\n/g, '<br>')}</p>
                            </details>
                            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #e2e8f0;">${marked.parse(item.explicacaoIA)}</div>
                        </div>
                    `;
                    listaCaderno.innerHTML += htmlItem;
                });
            } catch (e) {
                console.error("Erro ao buscar caderno: ", e);
                listaCaderno.innerHTML = '<p>Erro ao carregar o caderno.</p>';
            }
        };

        window.removerDoCaderno = async function(docId) {
            try {
                await deleteDoc(doc(db, "cadernos", docId));
                document.getElementById(`doc-${docId}`).remove();
                
                let atual = parseInt(document.getElementById('contadorCaderno').innerText);
                document.getElementById('contadorCaderno').innerText = atual - 1;
            } catch (e) {
                console.error("Erro ao excluir: ", e);
                alert("Erro ao excluir do caderno.");
            }
        };
    </script>
</body>
</html>
